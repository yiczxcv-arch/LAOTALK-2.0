<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#211a3d" />
      <stop offset="30%" stop-color="#5a3361" />
      <stop offset="55%" stop-color="#a8506a" />
      <stop offset="75%" stop-color="#e07a3f" />
      <stop offset="100%" stop-color="#f8bd5c" />
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2cf" stop-opacity="1" />
      <stop offset="45%" stop-color="#ffd98a" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#ffd98a" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe3a3" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#ffe3a3" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="stupaGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe8b0" />
      <stop offset="50%" stop-color="#f3b34d" />
      <stop offset="100%" stop-color="#8a5a1e" />
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#241a38" />
      <stop offset="100%" stop-color="#0d0916" />
    </linearGradient>
    <linearGradient id="waterShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f8bd5c" stop-opacity="0" />
      <stop offset="50%" stop-color="#f8bd5c" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#f8bd5c" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="800" height="480" fill="url(#sky)" />

  <!-- stars -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="90" cy="60" r="1.6" />
    <circle cx="150" cy="100" r="1.2" />
    <circle cx="230" cy="50" r="1.4" />
    <circle cx="640" cy="70" r="1.6" />
    <circle cx="700" cy="120" r="1.2" />
    <circle cx="580" cy="45" r="1.3" />
    <circle cx="380" cy="35" r="1.2" />
  </g>

  <circle cx="400" cy="330" r="220" fill="url(#sun)" />
  <circle cx="400" cy="255" r="150" fill="url(#halo)" />

  <!-- distant hazy hills -->
  <path d="M0 300 C120 270 200 300 320 275 C420 255 520 285 620 265 C700 250 760 270 800 260 L800 340 L0 340 Z" fill="#7a4c5a" opacity="0.45" />

  <!-- palms left -->
  <g fill="#150f22">
    <path d="M46 402 C22 336 66 292 44 250 C78 282 90 326 66 358 Z" />
    <path d="M46 402 C68 348 34 304 62 262 C40 300 22 338 46 402 Z" />
    <path d="M46 402 C12 366 -10 380 -22 350 C10 358 34 366 46 388 Z" />
    <path d="M46 402 C82 372 108 384 122 356 C90 362 64 372 50 392 Z" />
    <rect x="39" y="326" width="11" height="96" rx="2" />
  </g>
  <g fill="#150f22" opacity="0.92">
    <path d="M748 412 C724 350 768 312 746 270 C780 296 792 338 770 368 Z" />
    <path d="M748 412 C770 360 738 318 764 280 C742 312 724 348 748 412 Z" />
    <rect x="741" y="342" width="11" height="90" rx="2" />
  </g>

  <!-- reflective glow band behind stupa -->
  <rect x="0" y="386" width="800" height="6" fill="url(#waterShine)" />

  <!-- Pha That Luang inspired stupa silhouette, gilded -->
  <g>
    <ellipse cx="400" cy="400" rx="118" ry="10" fill="#000000" opacity="0.35" />

    <g fill="url(#stupaGold)" stroke="#5c3a12" stroke-width="1">
      <rect x="322" y="384" width="156" height="18" rx="2" />
      <rect x="338" y="368" width="124" height="16" rx="2" />
      <rect x="352" y="348" width="96" height="20" />
      <path d="M358 348 L442 348 L418 300 L382 300 Z" />
      <rect x="388" y="262" width="24" height="38" />
      <path d="M376 262 L424 262 L400 214 Z" />
      <rect x="393" y="196" width="14" height="18" />
      <path d="M386 196 L414 196 L400 170 Z" />
      <rect x="397" y="156" width="6" height="14" />
      <circle cx="400" cy="150" r="5" />
    </g>

    <!-- corner spires -->
    <g fill="url(#stupaGold)" stroke="#5c3a12" stroke-width="1">
      <path d="M330 384 L346 384 L338 344 Z" />
      <path d="M470 384 L454 384 L462 344 Z" />
      <path d="M346 368 L360 368 L352 336 Z" />
      <path d="M454 368 L440 368 L448 336 Z" />
    </g>

    <!-- highlight strokes for gilded sheen -->
    <g stroke="#fff2cf" stroke-width="1.5" opacity="0.55" fill="none">
      <path d="M358 348 L442 348" />
      <path d="M352 348 L448 368" />
      <path d="M338 368 L462 368" />
    </g>
  </g>

  <!-- foreground silhouette hill for depth -->
  <path d="M0 420 C90 400 180 428 280 410 C380 396 480 424 560 408 C660 390 740 416 800 402 L800 480 L0 480 Z" fill="#0b0812" />

  <rect x="0" y="404" width="800" height="76" fill="url(#ground)" opacity="0.55" />
</svg>
